name: Tests

on: [push, pull_request]

env:
  BINANCE_API_KEY: "test_dummy_key"
  BINANCE_API_SECRET: "test_dummy_secret"
  BINANCE_TESTNET: "true"
  CRYPTOPANIC_API_KEY: "test_dummy_key"
  COINGECKO_API_KEY: ""
  CRYPTOCOMPARE_API_KEY: ""
  REDDIT_CLIENT_ID: ""
  REDDIT_CLIENT_SECRET: ""
  REDDIT_USER_AGENT: "AlphaCore/1.0"
  LOG_LEVEL: "INFO"
  PORTFOLIO_INITIAL_CAPITAL: "10000"
  MAX_POSITION_SIZE_PCT: "0.05"
  MAX_POSITION_SIZE_USD: "500"
  STOP_LOSS_PCT: "0.03"
  TRADING_FEE_PCT: "0.001"
  TRADING_PAUSED: "false"
  MODEL_CHECKPOINT_DIR: "./models_saved"
  TRADING_PAIRS: '["BTC/USDT","ETH/USDT","SOL/USDT","BNB/USDT","ADA/USDT"]'
  DATA_CACHE_DIR: "./data_cache"
  ALERT_WEBHOOK_URL: ""
  DATABASE_URL: "sqlite:///./test.db"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short
